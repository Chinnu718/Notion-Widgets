<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Streak Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; display: flex; justify-content: center; align-items: flex-start; padding: 0; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .tracker { background: transparent; border-radius: 16px; padding: 24px; width: 100%; max-width: 580px; border: none; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-title { font-size: 15px; font-weight: 500; color: #1a1a1a; }
  .header-sub { font-size: 12px; color: #aaa; margin-top: 2px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .card { background: #f5f5f5; border-radius: 12px; padding: 16px 18px; border: 0.5px solid #e8e8e8; }
  .card-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .card-value { font-size: 36px; font-weight: 500; color: #1a1a1a; line-height: 1; }
  .card-unit { font-size: 14px; color: #ccc; font-weight: 400; margin-left: 4px; }
  .card-best { background: #f0fdf4; border: 0.5px solid #bbf7d0; }
  .card-best .card-value { color: #16a34a; }
  .progress-section { margin-bottom: 20px; }
  .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .progress-label { font-size: 12px; color: #aaa; }
  .progress-pct { font-size: 12px; color: #ccc; }
  .progress-bar-bg { background: #f0f0f0; border-radius: 6px; height: 8px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, #22c55e, #86efac); transition: width 0.8s ease; }
  .milestones { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .milestone { background: #f5f5f5; border: 0.5px solid #e8e8e8; border-radius: 20px; padding: 5px 12px; font-size: 11px; color: #ccc; display: flex; align-items: center; gap: 5px; }
  .milestone.done { background: #f0fdf4; border-color: #bbf7d0; color: #16a34a; }
  .milestone i { font-size: 12px; }
  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .btn { padding: 11px; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 7px; transition: opacity 0.15s; font-family: inherit; }
  .btn:hover { opacity: 0.8; }
  .btn:active { transform: scale(0.98); }
  .btn-relapse { background: #fff1f2; color: #ef4444; border: 0.5px solid #fecaca; }
  .btn-share { background: #f5f5f5; color: #aaa; border: 0.5px solid #e8e8e8; }
  .start-section { background: #f5f5f5; border-radius: 12px; padding: 16px 18px; border: 0.5px solid #e8e8e8; }
  .start-label { font-size: 12px; color: #aaa; margin-bottom: 8px; }
  .start-row { display: flex; gap: 8px; align-items: center; }
  .date-input { flex: 1; background: #ffffff; border: 0.5px solid #ddd; border-radius: 8px; padding: 8px 12px; color: #1a1a1a; font-size: 13px; font-family: inherit; outline: none; }
  .date-input:focus { border-color: #22c55e; }
  .btn-set { background: #f0fdf4; color: #16a34a; border: 0.5px solid #bbf7d0; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .btn-set:hover { opacity: 0.85; }
  .divider { height: 0.5px; background: #f0f0f0; margin: 16px 0; }
  .quote { font-size: 12px; color: #ccc; text-align: center; font-style: italic; padding: 0 8px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #ffffff; border-radius: 14px; padding: 24px; border: 0.5px solid #e8e8e8; max-width: 300px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
  .modal h3 { font-size: 15px; color: #1a1a1a; margin-bottom: 8px; font-weight: 500; }
  .modal p { font-size: 13px; color: #aaa; margin-bottom: 20px; line-height: 1.5; }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btns button { flex: 1; padding: 10px; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 500; }
  .modal-cancel { background: #f5f5f5; color: #aaa; border: none; }
  .modal-confirm { background: #fff1f2; color: #ef4444; border: none; }
  input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.4; }
</style>
</head>
<body>
<div class="tracker">
  <div class="header">
    <div class="header-left">
      <div class="status-dot"></div>
      <div>
        <div class="header-title">Streak tracker</div>
        <div class="header-sub" id="startedText">Set your start date below</div>
      </div>
    </div>
    <div style="font-size:11px;color:#ccc;">notion · personal</div>
  </div>

  <div class="cards">
    <div class="card">
      <div class="card-label"><i class="ti ti-flame"></i> Current streak</div>
      <div class="card-value" id="currentStreak">0<span class="card-unit">d</span></div>
    </div>
    <div class="card card-best">
      <div class="card-label"><i class="ti ti-trophy"></i> Best streak</div>
      <div class="card-value" id="bestStreak">0<span class="card-unit">d</span></div>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-header">
      <span class="progress-label" id="progressLabel">Next milestone: 3 days</span>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="milestones" id="milestones"></div>

  <div class="actions">
    <button class="btn btn-relapse" onclick="openModal()"><i class="ti ti-refresh"></i> Log relapse</button>
    <button class="btn btn-share" onclick="copyStats()"><i class="ti ti-copy"></i> Copy stats</button>
  </div>

  <div class="start-section">
    <div class="start-label">Start date — when did your current streak begin?</div>
    <div class="start-row">
      <input type="date" class="date-input" id="startDate" />
      <button class="btn-set" onclick="setStartDate()">Set date</button>
    </div>
  </div>

  <div class="divider"></div>
  <div class="quote" id="quoteEl"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Log a relapse?</h3>
    <p>This will reset your current streak. Your best streak will be saved if this was your longest run.</p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" onclick="confirmRelapse()">Yes, reset</button>
    </div>
  </div>
</div>

<script>
const MILESTONES = [3, 7, 14, 30, 60, 90];
const QUOTES = [
  "Every day is a victory.",
  "Discipline is choosing what you want most over what you want now.",
  "You are stronger than you think.",
  "One day at a time. That's all it takes.",
  "The best project you'll ever work on is you.",
  "Hard days build strong souls.",
  "Your future self is watching. Make them proud."
];
function getStorage() {
  try { const d = localStorage.getItem('nofap_tracker'); return d ? JSON.parse(d) : {}; }
  catch(e) { return {}; }
}
function setStorage(data) {
  try { localStorage.setItem('nofap_tracker', JSON.stringify(data)); } catch(e) {}
}
function getDaysDiff(dateStr) {
  if (!dateStr) return 0;
  const start = new Date(dateStr);
  const now = new Date();
  start.setHours(0,0,0,0); now.setHours(0,0,0,0);
  return Math.max(0, Math.floor((now - start) / 86400000));
}
function getNextMilestone(days) {
  for (const m of MILESTONES) { if (days < m) return m; }
  return MILESTONES[MILESTONES.length - 1] + 30;
}
function render() {
  const data = getStorage();
  const current = getDaysDiff(data.startDate);
  const best = Math.max(current, data.bestStreak || 0);
  document.getElementById('currentStreak').innerHTML = `${current}<span class="card-unit">d</span>`;
  document.getElementById('bestStreak').innerHTML = `${best}<span class="card-unit">d</span>`;
  if (data.startDate) {
    const d = new Date(data.startDate);
    document.getElementById('startedText').textContent = `Started ${d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'})}`;
    document.getElementById('startDate').value = data.startDate;
  }
  const next = getNextMilestone(current);
  const prev = MILESTONES[MILESTONES.indexOf(next) - 1] || 0;
  const pct = next > prev ? Math.min(100, Math.round(((current - prev) / (next - prev)) * 100)) : 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressLabel').textContent = current >= MILESTONES[MILESTONES.length-1] ? 'All milestones hit!' : `Next milestone: ${next} days`;
  document.getElementById('milestones').innerHTML = MILESTONES.map(m =>
    `<div class="milestone ${current >= m ? 'done' : ''}"><i class="ti ${current >= m ? 'ti-check' : 'ti-lock'}"></i>${m}d</div>`
  ).join('');
  document.getElementById('quoteEl').textContent = QUOTES[current % QUOTES.length];
}
function setStartDate() {
  const val = document.getElementById('startDate').value;
  if (!val) return;
  const data = getStorage();
  data.startDate = val;
  setStorage(data);
  render();
}
function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function confirmRelapse() {
  const data = getStorage();
  const current = getDaysDiff(data.startDate);
  data.bestStreak = Math.max(current, data.bestStreak || 0);
  data.startDate = new Date().toISOString().split('T')[0];
  setStorage(data);
  closeModal();
  render();
}
function copyStats() {
  const data = getStorage();
  const current = getDaysDiff(data.startDate);
  const best = Math.max(current, data.bestStreak || 0);
  navigator.clipboard.writeText(`Streak stats:\nCurrent: ${current} days\nBest: ${best} days`).catch(()=>{});
}
render();
setInterval(render, 60000);
</script>
</body>
</html>
